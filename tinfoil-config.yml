      - TINFOIL_BASE_URL: "https://router.inf5.tinfoil.sh/v1"
      - TINFOIL_INFERENCE_ENCLAVE: "router.inf5.tinfoil.sh"
      - TINFOIL_INFERENCE_REPO: "tinfoilsh/confidential-model-router"
      - TINFOIL_LLM_MODEL: "gpt-oss-120b"
      - TINFOIL_EMBED_MODEL: "nomic-embed-text"
      - TINFOIL_SMOKE_BUILD_MARKER: "sdk-attested-model-calls-20260227-r1"
